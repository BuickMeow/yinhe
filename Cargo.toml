[workspace]
members = [
    "crates/yinhe-types",
    "crates/yinhe-midi",
    "crates/yinhe-dms",
    "crates/yinhe-archive",
    "crates/yinhe-wgpu",
    "crates/yinhe-pianoroll",
    "crates/yinhe-arrangement",
    "crates/yinhe-egui",
]
resolver = "2"

[workspace.dependencies]
wgpu = "29.0.3"
eframe = { version = "0.34.2", features = ["wgpu"] }
egui = "0.34.2"
pollster = "0.4"
bytemuck = { version = "1", features = ["derive"] }
midly = "0.5.3"
thiserror = "2.0.18"
half = "2"
rayon = "1"
rfd = "0.17.2"
tracing = "0.1"
tracing-subscriber = "0.3"
